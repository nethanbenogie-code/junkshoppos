<style>
  :root{
    --bg:#E9E7E1; --card:#FFFFFF; --line:#D5D2CA; --ink:#22252A; --muted:#6E7076;
    --amber:#E8930C; --amber-dark:#C67B08; --rust:#B4472E; --green:#2E7D4F;
    --lcd-bg:#14231A; --lcd-digit:#8AF5A3; --lcd-dim:#3D5C49;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
  .display{font-family:"Arial Narrow","Helvetica Neue",system-ui,sans-serif;letter-spacing:.03em;font-stretch:condensed;text-transform:uppercase;font-weight:700}
  .mono{font-family:ui-monospace,"Courier New",monospace}
  button{font-family:inherit;-webkit-user-select:none;user-select:none}
  button:active{transform:translateY(1px)}
  input{font-family:inherit}

  .wrap{max-width:480px;margin:0 auto;padding:0 12px 100px}
  header.app{display:flex;align-items:baseline;justify-content:space-between;padding:16px 4px 12px}
  header.app .title{font-size:24px}
  header.app .title span{color:var(--amber)}
  header.app .date{font-size:12px;color:var(--muted)}

  /* Timbang layout */
  .tg{display:flex;flex-direction:column;gap:14px}
  .mat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .rep-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  @media(min-width:700px){
    .wrap{max-width:700px}
    .mat-grid{grid-template-columns:repeat(4,1fr)}
    .rep-grid{grid-template-columns:repeat(4,1fr)}
  }
  @media(min-width:980px){
    .wrap{max-width:1000px}
    .tg{display:grid;grid-template-columns:400px 1fr;grid-template-rows:auto auto 1fr;
        grid-template-areas:"toggle chips" "lcd chips" "pad ticket";gap:16px 24px;align-items:start}
    .a-toggle{grid-area:toggle}.a-lcd{grid-area:lcd}.a-chips{grid-area:chips}.a-pad{grid-area:pad}.a-ticket{grid-area:ticket}
  }

  .toggle-row{display:flex;gap:8px}
  .toggle-btn{flex:1;padding:10px 0;font-size:16px;border-radius:10px;cursor:pointer;border:2px solid var(--line);background:var(--card);color:var(--muted)}
  .toggle-btn.buy.on{border-color:var(--amber);background:var(--amber);color:#fff}
  .toggle-btn.sell.on{border-color:var(--green);background:var(--green);color:#fff}

  .lcd{background:var(--lcd-bg);border-radius:14px;padding:14px 16px;border:3px solid #0C1811;box-shadow:inset 0 2px 12px rgba(0,0,0,.6)}
  .lcd .row1{display:flex;justify-content:space-between;font-size:12px;color:var(--lcd-dim);text-transform:uppercase}
  .lcd .kilos{font-size:46px;color:var(--lcd-digit);text-align:right;line-height:1.15;text-shadow:0 0 8px rgba(138,245,163,.4)}
  .lcd .kilos small{font-size:20px;color:var(--lcd-dim)}
  .lcd .total{font-size:18px;text-align:right;color:var(--lcd-dim)}
  .lcd .total.on{color:var(--lcd-digit)}

  .chip{padding:10px 4px;border-radius:10px;cursor:pointer;border:2px solid var(--line);background:var(--card);text-align:center;min-width:0}
  .chip.on{border-color:var(--amber);background:#FDF3E3}
  .chip .nm{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .pr{font-size:11px;color:var(--muted)}

  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pad button{padding:13px 0;font-size:22px;border-radius:10px;cursor:pointer;background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .add-btn{width:100%;margin-top:10px;padding:14px 0;font-size:18px;border-radius:12px;border:none;background:var(--ink);color:#fff;cursor:pointer}
  .add-btn:disabled{background:var(--line);color:var(--muted);cursor:default;transform:none}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .ticket-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px dashed var(--line)}
  .ticket-row:last-of-type{border-bottom:none}
  .ticket-row .info{flex:1;min-width:0}
  .ticket-row .nm{font-size:15px}
  .ticket-row .sub{font-size:12px;color:var(--muted)}
  .xbtn{background:none;border:none;cursor:pointer;color:var(--rust);padding:4px;font-size:16px;line-height:1}
  .pay-btn{width:100%;padding:15px 0;font-size:19px;border:none;cursor:pointer;color:#fff}
  .pay-btn.buy{background:var(--amber)}
  .pay-btn.sell{background:var(--green)}
  .empty-box{border:2px dashed var(--line);border-radius:12px;padding:20px 12px;text-align:center;color:var(--muted);font-size:13px}

  /* Presyo */
  .settings-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
  .settings-card .hd{font-size:14px;color:var(--muted);margin-bottom:8px}
  .settings-card input[type=text]{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font-size:14px;margin-bottom:8px;outline:none;color:var(--ink)}
  .chk{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px;cursor:pointer}
  .price-head,.price-row{display:grid;grid-template-columns:1fr 76px 76px 32px;gap:6px;align-items:center}
  .price-head{padding:0 14px 6px;font-size:13px;color:var(--muted)}
  .price-head div:nth-child(2),.price-head div:nth-child(3){text-align:right}
  .price-row{padding:8px 10px;border-top:1px solid var(--line)}
  .price-row:first-child{border-top:none}
  .price-row input.nm{border:none;background:transparent;font-size:14px;font-weight:600;color:var(--ink);min-width:0;outline:none}
  .price-row input.pr{width:100%;text-align:right;font-size:14px;padding:5px 6px;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--ink);outline:none}
  .dash-btn{width:100%;margin-top:10px;padding:12px 0;font-size:16px;border-radius:10px;border:2px dashed var(--line);background:transparent;color:var(--muted);cursor:pointer}
  .util-row{display:flex;gap:8px;margin-top:18px}
  .util-row button{flex:1;padding:10px 0;font-size:13px;border-radius:10px;background:var(--card);cursor:pointer}
  .util-reset{border:1px solid var(--line);color:var(--muted)}
  .util-danger{border:1px solid var(--rust);color:var(--rust)}
  .confirm-box{margin-top:10px;padding:12px;border-radius:10px;background:#FBEDE9;border:1px solid var(--rust);font-size:13px}
  .confirm-box .btns{display:flex;gap:8px;margin-top:8px}
  .confirm-box button{flex:1;padding:8px;border-radius:8px;cursor:pointer}
  .confirm-yes{border:none;background:var(--rust);color:#fff;font-weight:700}
  .confirm-no{border:1px solid var(--line);background:var(--card)}

  /* Gastos */
  .cat-row{display:flex;flex-wrap:wrap;gap:6px}
  .cat-chip{padding:6px 12px;border-radius:999px;border:2px solid var(--line);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted)}
  .cat-chip.on{border-color:var(--amber);background:#FDF3E3;color:var(--ink)}
  #g-desc,#g-amt{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font-size:14px;margin-top:8px;outline:none;color:var(--ink)}

  /* Rekord / Report */
  .day-title{font-size:15px;padding:0 4px 6px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .stat .lb{font-size:11px;color:var(--muted);text-transform:uppercase}
  .stat .vl{font-size:14px}
  .rep-grid .stat .vl{font-size:17px}
  .tx-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
  .tx-row:first-child{border-top:none}
  .tx-row .info{flex:1;min-width:0}
  .tx-row .top{display:flex;justify-content:space-between;align-items:baseline}
  .tx-row .tag{font-size:14px}
  .tx-row .tag.buy{color:var(--amber-dark)}
  .tx-row .tag.sell{color:var(--green)}
  .tx-row .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .print-mini{background:none;border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--muted);padding:6px 9px;font-size:14px}
  .period-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .period-btn{flex:1;min-width:70px;padding:9px 0;font-size:15px;border-radius:10px;cursor:pointer;border:2px solid var(--line);background:var(--card);color:var(--muted)}
  .period-btn.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .rep-head,.rep-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:4px;padding:9px 12px}
  .rep-head{background:var(--bg);border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}
  .rep-head div,.rep-row div{text-align:right;min-width:0}
  .rep-head div:first-child,.rep-row div:first-child{text-align:left}
  .rep-row{border-top:1px solid var(--line);font-size:13px}
  .rep-row:first-of-type{border-top:none}
  .big-print{width:100%;margin-top:14px;padding:14px 0;font-size:17px;border-radius:12px;border:none;cursor:pointer;background:var(--ink);color:#fff}
  .big-print:disabled{background:var(--line);color:var(--muted);cursor:default;transform:none}

  /* nav + toast */
  nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);z-index:40;padding-bottom:env(safe-area-inset-bottom)}
  nav .inner{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
  nav button{padding:9px 0 11px;background:none;border:none;cursor:pointer;color:var(--muted)}
  nav button.on{color:var(--amber-dark)}
  nav .ic{font-size:19px;line-height:1}
  nav .lb{font-size:11px;margin-top:2px}
  #toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:15px;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:50;display:none}
  #toast.bad{background:var(--rust)}

  /* printing */
  #print-area{display:none}
  @media print{
    body{background:#fff!important}
    #app{display:none!important}
    #print-area{display:block!important;color:#000;background:#fff}
    .receipt{width:270px;font-family:ui-monospace,"Courier New",monospace;font-size:12px}
    .receipt .c{text-align:center}
    .receipt .b{font-weight:700}
    .receipt .ln{display:flex;justify-content:space-between}
    .report-doc{font-family:system-ui,sans-serif;font-size:13px;max-width:720px}
    .report-doc table{width:100%;border-collapse:collapse;margin-top:6px}
    .report-doc th,.report-doc td{border:1px solid #999;padding:5px 8px;text-align:right}
    .report-doc th:first-child,.report-doc td:first-child{text-align:left}
    @page{margin:10mm}
  }
</style>
</head>
<body>

<div id="app">
  <div class="wrap">
    <header class="app">
      <div class="display title" id="hdr-title">Junkshop <span>POS</span></div>
      <div class="mono date" id="hdr-date"></div>
    </header>
    <main id="view"></main>
  </div>
  <div id="toast"></div>
  <nav>
    <div class="inner" id="nav"></div>
  </nav>
</div>

<div id="print-area"></div>

<script>
"use strict";
// ================= data =================
const DEFAULT_MATERIALS = [
  { id:"bakal", name:"Bakal", buy:10, sell:13 },
  { id:"tanso", name:"Tanso", buy:350, sell:380 },
  { id:"aluminum", name:"Aluminum", buy:45, sell:55 },
  { id:"lata", name:"Lata", buy:7, sell:9 },
  { id:"stainless", name:"Stainless", buy:35, sell:45 },
  { id:"yero", name:"Yero", buy:7, sell:9 },
  { id:"karton", name:"Karton", buy:4, sell:5.5 },
  { id:"papel", name:"Papel (puti)", buy:6, sell:8 },
  { id:"plastik", name:"Plastik (assorted)", buy:8, sell:11 },
  { id:"bote", name:"Bote", buy:1.5, sell:2.5 },
  { id:"baterya", name:"Baterya", buy:35, sell:42 },
];
const GASTO_CATS = ["Kuryente","Tubig","Sweldo","Plete","Pagkaon","Gasolina","Uban"];
const DEFAULT_SETTINGS = { shopName:"JUNKSHOP", shopInfo:"", autoPrint:false };
const KEY = "junkshop:data";

let D = { materials: DEFAULT_MATERIALS.map(m=>({...m})), transactions: [], expenses: [], settings: {...DEFAULT_SETTINGS} };
try {
  const raw = localStorage.getItem(KEY);
  if (raw) {
    const p = JSON.parse(raw);
    if (Array.isArray(p.materials) && p.materials.length) D.materials = p.materials;
    if (Array.isArray(p.transactions)) D.transactions = p.transactions;
    if (Array.isArray(p.expenses)) D.expenses = p.expenses;
    if (p.settings) D.settings = { ...DEFAULT_SETTINGS, ...p.settings };
  }
} catch(e) {}

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(KEY, JSON.stringify(D)); }
    catch(e){ toast("Wala ma-save — puno ang storage", true); }
  }, 300);
}

// ui state
let S = { tab:"timbang", mode:"buy", selectedId:null, kilosStr:"", ticket:[], period:"day", confirmClear:false, gastoCat:"Uban" };

// ================= helpers =================
const $ = (sel) => document.querySelector(sel);
const esc = (s) => String(s??"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const peso = (n) => "\u20B1" + (Number(n)||0).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2});
const num  = (n) => (Number(n)||0).toLocaleString("en-PH",{maximumFractionDigits:2});
const kgf  = (n) => num(n) + " kg";
const dateKey = (ts) => new Date(ts).toLocaleDateString("en-PH",{year:"numeric",month:"short",day:"numeric",weekday:"short"});
const timeStr = (ts) => new Date(ts).toLocaleTimeString("en-PH",{hour:"numeric",minute:"2-digit"});
const fullStamp = (ts) => new Date(ts).toLocaleString("en-PH",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
const startOfDay = (d) => { const x=new Date(d); x.setHours(0,0,0,0); return x; };

let toastTimer=null;
function toast(msg, bad){
  const t = $("#toast");
  t.textContent = msg;
  t.className = bad ? "bad" : "";
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display="none"; }, 2200);
}

function mat(id){ return D.materials.find(m=>m.id===id) || null; }
function unitPrice(m){ return m ? (S.mode==="buy" ? m.buy : m.sell) : 0; }

// ================= reports =================
const PERIODS = [ {k:"day",label:"Karon"}, {k:"week",label:"7 Adlaw"}, {k:"month",label:"Bulan"}, {k:"all",label:"Tanan"} ];
const periodLabel = { day:"Report Karong Adlawa", week:"Report — Miaging 7 ka Adlaw", month:"Report Karong Bulana", all:"Report — Tanan" };

function inPeriod(ts, p){
  const now = new Date();
  const d = new Date(ts);
  if (p==="day")   return startOfDay(d).getTime() === startOfDay(now).getTime();
  if (p==="week")  return d >= new Date(startOfDay(now).getTime() - 6*86400000);
  if (p==="month") return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  return true;
}
function filterByPeriod(p){ return D.transactions.filter(tx => inPeriod(tx.ts, p)); }
function filterExpByPeriod(p){ return (D.expenses||[]).filter(x => inPeriod(x.ts, p)); }

function aggregate(txs){
  const rows = {};
  let buyCash=0, sellCash=0, kIn=0, kOut=0;
  for (const tx of txs) for (const it of tx.items){
    const r = rows[it.name] = rows[it.name] || { name:it.name, kIn:0, pIn:0, kOut:0, pOut:0 };
    if (tx.type==="buy"){ r.kIn+=it.kilos; r.pIn+=it.total; buyCash+=it.total; kIn+=it.kilos; }
    else { r.kOut+=it.kilos; r.pOut+=it.total; sellCash+=it.total; kOut+=it.kilos; }
  }
  return { rows:Object.values(rows).sort((a,b)=>(b.pIn+b.pOut)-(a.pIn+a.pOut)), buyCash, sellCash, kIn, kOut, count:txs.length };
}

// ================= printing =================
function printReceipt(tx){
  const st = D.settings;
  const sep = "--------------------------------";
  let h = '<div class="receipt">';
  h += '<div class="c b">'+esc(st.shopName||"JUNKSHOP")+'</div>';
  if (st.shopInfo) h += '<div class="c">'+esc(st.shopInfo)+'</div>';
  h += '<div class="c">'+esc(fullStamp(tx.ts))+'</div>';
  h += '<div class="c">'+(tx.type==="buy" ? "* RESIBO SA PALIT *" : "* RESIBO SA BALIGYA *")+'</div>';
  h += '<div>'+sep+'</div>';
  for (const it of tx.items){
    h += '<div class="ln"><span>'+esc(it.name)+' '+num(it.kilos)+'kg x '+num(it.price)+'</span><span>'+num(it.total)+'</span></div>';
  }
  h += '<div>'+sep+'</div>';
  h += '<div class="ln b"><span>TOTAL</span><span>'+peso(tx.total)+'</span></div>';
  h += '<div>'+sep+'</div><div class="c">Daghang salamat!</div></div>';
  $("#print-area").innerHTML = h;
  setTimeout(()=>window.print(), 100);
}

function printReport(){
  const txs = filterByPeriod(S.period);
  const a = aggregate(txs);
  const exps = filterExpByPeriod(S.period);
  const expTotal = exps.reduce((s,x)=>s+x.amount,0);
  if (!a.count && !exps.length) return;
  const st = D.settings;
  let h = '<div class="report-doc">';
  h += '<h2 style="margin:0 0 2px">'+esc(st.shopName||"JUNKSHOP")+'</h2>';
  if (st.shopInfo) h += '<div>'+esc(st.shopInfo)+'</div>';
  h += '<h3 style="margin:8px 0 2px">'+periodLabel[S.period]+'</h3>';
  h += '<div>Gi-print: '+esc(fullStamp(new Date()))+'</div>';
  if (a.rows.length){
    h += '<table><thead><tr><th>Item</th><th>Kilo Palit</th><th>&#8369; Palit</th><th>Kilo Baligya</th><th>&#8369; Baligya</th></tr></thead><tbody>';
    for (const r of a.rows){
      h += '<tr><td>'+esc(r.name)+'</td><td>'+num(r.kIn)+'</td><td>'+num(r.pIn)+'</td><td>'+num(r.kOut)+'</td><td>'+num(r.pOut)+'</td></tr>';
    }
    h += '<tr style="font-weight:700"><td>TOTAL</td><td>'+num(a.kIn)+'</td><td>'+num(a.buyCash)+'</td><td>'+num(a.kOut)+'</td><td>'+num(a.sellCash)+'</td></tr>';
    h += '</tbody></table>';
  }
  if (exps.length){
    h += '<h3 style="margin:12px 0 2px">Mga Gastos</h3>';
    h += '<table><thead><tr><th>Gasto</th><th style="text-align:left">Kategorya</th><th>&#8369;</th></tr></thead><tbody>';
    for (const x of exps){
      h += '<tr><td>'+esc(x.desc||x.cat)+'</td><td style="text-align:left">'+esc(x.cat)+'</td><td>'+num(x.amount)+'</td></tr>';
    }
    h += '<tr style="font-weight:700"><td>TOTAL</td><td></td><td>'+num(expTotal)+'</td></tr>';
    h += '</tbody></table>';
  }
  h += '<div style="margin-top:10px">';
  h += '<div>Ihap sa transaksyon: '+a.count+'</div>';
  h += '<div>Kwarta nga migawas (palit): '+peso(a.buyCash)+'</div>';
  h += '<div>Kwarta nga misulod (baligya): '+peso(a.sellCash)+'</div>';
  h += '<div>Total nga gastos: '+peso(expTotal)+'</div>';
  h += '<div style="font-weight:700">Netong ginansya: '+peso(a.sellCash - a.buyCash - expTotal)+'</div>';
  h += '</div></div>';
  $("#print-area").innerHTML = h;
  setTimeout(()=>window.print(), 100);
}

// ================= actions =================
function press(k){
  if (k==="back") S.kilosStr = S.kilosStr.slice(0,-1);
  else if (k===".") { if (!S.kilosStr.includes(".")) S.kilosStr = (S.kilosStr||"0")+"."; }
  else S.kilosStr = (S.kilosStr==="0" ? k : (S.kilosStr+k).slice(0,8));
  updateLCD();
}
function updateLCD(){
  const m = mat(S.selectedId);
  const kv = parseFloat(S.kilosStr)||0;
  const up = unitPrice(m);
  const el = $("#lcd"); if (!el) return;
  el.querySelector(".nm").textContent = m ? m.name.toUpperCase() : "PILI OG ITEM";
  el.querySelector(".up").textContent = m ? peso(up)+"/kg" : "--";
  el.querySelector(".kv").innerHTML = esc(S.kilosStr||"0") + '<small> kg</small>';
  const tot = el.querySelector(".total");
  tot.textContent = "= " + peso(kv*up);
  tot.classList.toggle("on", kv>0);
  const add = $("#add-btn"); if (add) add.disabled = !(m && kv>0);
}
function addToTicket(){
  const m = mat(S.selectedId);
  const kv = parseFloat(S.kilosStr)||0;
  if (!m || kv<=0) return;
  const up = unitPrice(m);
  S.ticket.push({ uid:Date.now()+Math.random(), matId:m.id, name:m.name, kilos:kv, price:up, total:kv*up });
  S.kilosStr=""; S.selectedId=null;
  render();
}
function completeTicket(){
  if (!S.ticket.length) return;
  const total = S.ticket.reduce((s,it)=>s+it.total,0);
  const tx = {
    id:"tx_"+Date.now(), type:S.mode,
    items:S.ticket.map(({uid, ...rest})=>rest),
    total, ts:new Date().toISOString(),
  };
  D.transactions.unshift(tx);
  S.ticket=[];
  save();
  render();
  toast(tx.type==="buy" ? "Bayran ang suki: "+peso(tx.total) : "Narekord ang baligya: "+peso(tx.total));
  if (D.settings.autoPrint) printReceipt(tx);
}

// ================= render =================
function render(){
  $("#hdr-title").innerHTML = esc(D.settings.shopName||"Junkshop") + ' <span>POS</span>';
  $("#hdr-date").textContent = new Date().toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"});
  renderNav();
  const v = $("#view");
  if (S.tab==="timbang") renderTimbang(v);
  else if (S.tab==="presyo") renderPresyo(v);
  else if (S.tab==="gastos") renderGastos(v);
  else if (S.tab==="talaan") renderTalaan(v);
  else renderUlat(v);
}

    for (const it of S.ticket){
      h += '<div class="ticket-row"><div class="info">'+
           '<div class="display nm">'+esc(it.name)+'</div>'+

  const groups = {};

  let h = '<div style="max-width:640px;margin:0 auto">';
  for (const [day, txs] of Object.entries(groups)){
    const bought = txs.filter(t=>t.type==="buy").reduce((s,t)=>s+t.total,0);

    h += '<div class="stat"><div class="lb">Nabaligya</div><div class="mono vl" style="color:var(--green)">'+peso(sold)+'</div></div>';
    h += '<div class="stat"><div class="lb">Kilo sulod</div><div class="mono vl">'+kgf(kilosIn)+'</div></div>';
    h += '</div><div class="card">';

      h += '<div class="tx-row"><div class="info"><div class="top">'+
           '<span class="display tag '+tx.type+'">'+(tx.type==="buy"?"Palit":"Baligya")+' \u00B7 '+timeStr(tx.ts)+'</span>'+
           '<span class="mono">'+peso(tx.total)+'</span></div>'+
           '<div class="sub">'+tx.items.map(it=>esc(it.name)+' '+kgf(it.kilos)).join(" \u00B7 ")+'</div></div>'+

    }
    h += '</div></div>';
  }
  h += '</div>';
  v.innerHTML = h;
  v.querySelectorAll("[data-print]").forEach(b => b.onclick = () => {
    const tx = D.transactions.find(t=>t.id===b.dataset.print);
    if (tx) printReceipt(tx);
  });
}

  let h = '<div style="max-width:720px;margin:0 auto">';

  h += '<div class="rep-grid" style="margin-bottom:14px">';
  const stats = [

    ["Gastos", peso(expTotal), "var(--rust)"],
    ["Netong ginansya", peso(neto), neto>=0?"var(--green)":"var(--rust)"],
    ["Kilo sulod", kgf(a.kIn), "var(--ink)"],

  }

    h += '<div class="card"><div class="rep-head display"><div>Item</div><div>Kilo palit</div><div>\u20B1 Palit</div><div>Kilo baligya</div><div>\u20B1 Baligya</div></div>';
    for (const r of a.rows){
      h += '<div class="rep-row"><div style="font-weight:600">'+esc(r.name)+'</div>'+
           '<div class="mono">'+num(r.kIn)+'</div><div class="mono" style="color:var(--amber-dark)">'+num(r.pIn)+'</div>'+
           '<div class="mono">'+num(r.kOut)+'</div><div class="mono" style="color:var(--green)">'+num(r.pOut)+'</div></div>';
    }
    h += '</div>';
  } else {
    h += '<div class="empty-box">Walay transaksyon niini nga panahon.</div>';
  }
  h += '<button class="display big-print" id="print-report"'+((a.count||exps.length)?"":" disabled")+'>\uD83D\uDDA8 I-print ang report</button>';
  h += '</div>';
  v.innerHTML = h;

  v.querySelectorAll("[data-period]").forEach(b => b.onclick = () => { S.period=b.dataset.period; render(); });
  $("#print-report").onclick = printReport;
